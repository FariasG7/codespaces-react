<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Obra Voz</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007AFF">

    <style>
        body { font-family: sans-serif; background: radial-gradient(#4f4f4f,#1c1c1c); margin: 0; padding: 20px; }
        header { background: #121212; color: #ffffff; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 10px; }
        
        /* Estilo do Widget de Clima */
        .weather-box { 
            background: #121212; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            text-align: center;
            font-size: 14px;
            color: #0056b3;
            border: 1px solid #b3d7ff;
        }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-size: 18px; color: white; cursor: pointer; }
        .btn-mic { background-color: #0056b3; border: 1px solid #b3d7ff; }
        .btn-mic.recording { background-color: #FF3B30; }
        .status { margin-top: 10px; font-size: 14px; color: #666; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>🏗️ Diário de Obra</h1>
</header>

<div id="weather" class="weather-box">
    Obtendo clima atual... ☁️
</div>


<div class="card">
    <textarea id="relato" placeholder="Toque no botão e comece a falar o que foi executado hoje..."></textarea>
    
    <input type="file" id="foto-input" accept="image/*" style="display: none;">
    <button id="upload-button" class="btn-mic" type="button">📸 Adicionar Foto</button>

   
    <button id="btnVoice" class="btn-mic">🎤 Iniciar Relato por Voz</button>
    <div id="status" class="status">Aguardando comando...</div>
</div>

<script>
    // --- LÓGICA DE CLIMA REAL ---
    async function getClima() {
        const weatherDiv = document.getElementById('weather');
        
        if (!navigator.geolocation) {
            weatherDiv.textContent = "Geolocalização não suportada.";
            return;
        }

        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            try {
                // API Gratuita Open-Meteo
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                
                const temp = data.current_weather.temperature;
                const code = data.current_weather.weathercode;

                // Mapeamento simples de códigos de clima
                const descricoes = {
                    0: "Céu limpo ☀️",
                    1: "Principalmente limpo 🌤️", 2: "Parcialmente nublado ⛅", 3: "Nublado ☁️",
                    45: "Neblina 🌫️", 61: "Chuva leve 🌧️", 63: "Chuva moderada 🌧️", 95: "Trovoada ⛈️"
                };

                const climaTexto = descricoes[code] || "Condições variáveis";
                weatherDiv.innerHTML = `<strong>Localização Atual:</strong> ${temp}°C - ${climaTexto}`;
            } catch (error) {
                weatherDiv.textContent = "Erro ao carregar clima.";
            }
        }, () => {
            weatherDiv.textContent = "Permissão de localização negada.";
        });
    }

    // Chama a função ao carregar a página
    getClima();

    // --- LÓGICA DE VOZ (Sua base original) ---
    const btn = document.getElementById('btnVoice');
    const campoTexto = document.getElementById('relato');
    const status = document.getElementById('status');
    let gravando = false;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Seu navegador não suporta reconhecimento de voz.");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript;
            campoTexto.value += transcript + ' ';
        };

        btn.addEventListener('click', () => {
            if (!gravando) {
                recognition.start();
                btn.textContent = '🛑 Parar Gravação';
                btn.classList.add('recording');
                status.textContent = 'Ouvindo...';
                gravando = true;
            } else {
                recognition.stop();
                btn.textContent = '🎤 Iniciar Relato por Voz';
                btn.classList.remove('recording');
                status.textContent = 'Gravado com sucesso!';
                gravando = false;
            }
        });
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => console.log("SW não configurado"));
    }
</script>

</body>
</html>
