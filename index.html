<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Obra Voz</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007AFF">

        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                 navigator.serviceWorker.register('/sw.js');
               });
            }
        </script>

    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        header { background: #007AFF; color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-size: 18px; color: white; cursor: pointer; }
        .btn-mic { background-color: #34C759; }
        .btn-mic.recording { background-color: #FF3B30; }
        .status { margin-top: 10px; font-size: 14px; color: #666; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>🏗️ Diário de Obra</h1>
</header>

<div className="clima-badge" onClick={buscarClima}>
  {clima} (toque para atualizar)
</div>

<div class="card">
    <textarea id="relato" placeholder="Toque no botão e comece a falar o que foi executado hoje..."></textarea>
    <button id="btnVoice" class="btn-mic">🎤 Iniciar Relato por Voz</button>
    <div id="status" class="status">Aguardando comando...</div>
</div>

<script>
    const btn = document.getElementById('btnVoice');
    const campoTexto = document.getElementById('relato');
    const status = document.getElementById('status');
    let gravando = false;

    // API de Voz
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Seu navegador não suporta reconhecimento de voz.");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript;
            campoTexto.value += transcript + ' ';
        };

        btn.addEventListener('click', () => {
            if (!gravando) {
                recognition.start();
                btn.textContent = '🛑 Parar Gravação';
                btn.classList.add('recording');
                status.textContent = 'Ouvindo...';
                gravando = true;
            } else {
                recognition.stop();
                btn.textContent = '🎤 Iniciar Relato por Voz';
                btn.classList.remove('recording');
                status.textContent = 'Gravado com sucesso!';
                gravando = false;
            }
        });
    }

    // Registrar Service Worker para PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => console.log("SW não configurado"));
    }
</script>

</body>
</html>
